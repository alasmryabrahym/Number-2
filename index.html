<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفيزياء الشامل - الأستاذ إبراهيم الأسمري</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; --dark: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; }
        .container::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--primary), #60a5fa); }
        .teacher-name { color: var(--danger); font-size: 1.6em; font-weight: bold; display: block; margin-top: 10px; }
        .school-name { color: #64748b; font-size: 1.2em; font-weight: 500; display: block; margin-bottom: 15px; }
        .q-counter { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
        
        /* صندوق الرسم البرمجي المضمون */
        .svg-drawing-box { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 280px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        
        .input-group { margin: 20px auto; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        input[type="text"] { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; width: 100%; max-width: 300px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }

        .option { background: #f8fafc; padding: 15px; width: 95%; max-width: 550px; border-radius: 12px; cursor: pointer; margin: 10px auto; border: 2px solid #e2e8f0; transition: 0.2s; text-align: right; position: relative; }
        .option:hover { border-color: var(--primary); background: #eff6ff; }
        .correct-opt { background: #dcfce7 !important; border-color: var(--success) !important; color: #16a34a; font-weight: bold; }
        .wrong-opt { background: #fee2e2 !important; border-color: var(--danger) !important; color: #dc2626; font-weight: bold; }
        
        #feedback-area { display: none; margin: 15px auto; padding: 15px; border-radius: 12px; max-width: 650px; text-align: right; border-right: 5px solid; }
        .fb-success { background: #dcfce7; border-color: #16a34a; color: #15803d; }
        .fb-danger { background: #fee2e2; border-color: #dc2626; color: #b91c1c; }
        
        #quiz-screen, #result-screen, #blocked-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>اختبار الفيزياء الموحد 🚀</h1>
        <span class="teacher-name">الأستاذ: إبراهيم الأسمري</span>
        <span class="school-name">ثانوية الأمير عبدالمجيد</span>
        <div class="input-group">
            <input type="text" id="student-name" placeholder="الاسم الثلاثي للطالب (إلزامي)">
            <input type="text" id="student-class" placeholder="الفصل (مثال: 3 / 1)">
        </div>
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
    </div>

    <div id="quiz-screen">
        <div class="q-counter">سؤال <span id="current-q-num">1</span> من 25</div>
        <div style="font-weight: bold; color: var(--danger); margin-bottom: 10px;">⏳ المتبقي: <span id="timer">60</span> ثانية</div>
        
        <h2 id="q-text" style="margin: 15px 0; line-height: 1.6;"></h2>
        
        <div id="drawing-area" class="svg-drawing-box" style="display: none;"></div>

        <div id="options-container"></div>
        
        <div id="feedback-area">
            <strong id="fb-status"></strong>
            <p id="fb-explanation" style="margin-top: 8px;"></p>
        </div>
        <button id="next-btn" class="btn" style="display:none; margin-top: 20px;" onclick="nextQuestion()">السؤال التالي ➡️</button>
    </div>

    <div id="result-screen">
        <div style="background: #f1f5f9; padding: 30px; border-radius: 20px;">
            <h2 id="res-student-info"></h2>
            <div style="font-size: 40px; font-weight: bold; color: var(--primary); margin: 20px 0;">
                الدرجة: <span id="res-score-num">0</span> / 25
            </div>
        </div>
        <button class="btn" style="margin-top: 20px;" onclick="location.reload()">إعادة الاختبار</button>
    </div>
</div>

<script>
    let score = 0; let currentIdx = 0; let timerInterval;

    // مكتبة الرسوم البرمجية SVG
    const assets = {
        lens: `<svg width="100" height="140" viewBox="0 0 100 140"><path d="M50 10 Q85 70 50 130 Q15 70 50 10" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/><line x1="10" y1="70" x2="90" y2="70" stroke="#94a3b8" stroke-dasharray="4"/></svg>`,
        resistor: `<svg width="180" height="60" viewBox="0 0 180 60"><line x1="10" y1="30" x2="40" y2="30" stroke="#1e293b" stroke-width="3"/><path d="M40 30 L50 10 L65 50 L80 10 L95 50 L110 10 L125 50 L135 30" fill="none" stroke="#1e293b" stroke-width="3"/><line x1="135" y1="30" x2="170" y2="30" stroke="#1e293b" stroke-width="3"/></svg>`,
        refraction: `<svg width="160" height="120" viewBox="0 0 160 120"><rect x="10" y="60" width="140" height="50" fill="#f1f5f9" stroke="#94a3b8"/><line x1="40" y1="10" x2="80" y2="60" stroke="#ef4444" stroke-width="3"/><line x1="80" y1="60" x2="110" y2="110" stroke="#ef4444" stroke-width="3"/><line x1="80" y1="30" x2="80" y2="90" stroke="#64748b" stroke-dasharray="4"/></svg>`,
        circuit: `<svg width="140" height="100" viewBox="0 0 140 100"><rect x="20" y="20" width="100" height="60" fill="none" stroke="black" stroke-width="2"/><circle cx="70" cy="20" r="10" fill="#fef08a" stroke="black"/><line x1="65" y1="80" x2="75" y2="80" stroke="black" stroke-width="4"/><line x1="60" y1="85" x2="80" y2="85" stroke="black" stroke-width="2"/></svg>`
    };

    const questions = [
        { q: "بناءً على الرسم، ما هو نوع العدسة التي تظهر أمامك وتقوم بتجميع الأشعة؟", draw: assets.lens, options: ["عدسة محدبة", "عدسة مقعرة", "مرآة مستوية", "عدسة مفرقة"], correct: "عدسة محدبة", fb: "العدسة المحدبة تكون سميكة من الوسط وتعمل على تجميع الضوء." },
        { q: "في المخططات الكهربائية، يشير هذا الرمز (الزجزاج) إلى:", draw: assets.resistor, options: ["المقاومة الكهربائية", "البطارية (المصدر)", "المفتاح الكهربائي", "المصباح"], correct: "المقاومة الكهربائية", fb: "هذا الرمز يمثل إعاقة المادة لمرور التيار الكهربائي." },
        { q: "ما هي الظاهرة الفيزيائية المتمثلة في انحراف الشعاع عند انتقاله بين الوسطين في الرسم؟", draw: assets.refraction, options: ["الانكسار", "الانعكاس المنتظم", "الحيود", "الاستقطاب"], correct: "الانكسار", fb: "الانكسار هو تغير اتجاه الموجة عند انتقالها لوسط تختلف فيه سرعتها." },
        { q: "في الدوائر البسيطة، يمثل الجزء الدائري في الأعلى عادةً:", draw: assets.circuit, options: ["المصباح", "المولد الضخم", "المكثف", "المؤرض"], correct: "المصباح", fb: "الدائرة التي بداخلها علامة أو فتيل ترمز للمصباح المستهلك للطاقة." },
        { q: "وحدة قياس القوة في النظام الدولي (SI) هي:", options: ["نيوتن", "جول", "واط", "باسكال"], correct: "نيوتن", fb: "النيوتن هو وحدة القوة، بينما الجول للشغل والطاقة." },
        { q: "الجهاز المستخدم لقياس شدة التيار الكهربائي هو:", options: ["الأميتر", "الفولتمتر", "الأوميتر", "البارومتر"], correct: "الأميتر", fb: "الأميتر يقيس التيار ويوصل في الدائرة على التوالي." },
        { q: "تنشأ الكهرباء الساكنة نتيجة انتقال ........ من جسم لآخر:", options: ["الإلكترونات", "البروتونات", "النيوترونات", "الذرات كاملة"], correct: "الإلكترونات", fb: "الإلكترونات هي الجسيمات القابلة للانتقال بالدلك أو الحث." },
        { q: "أي الألوان التالية له أكبر طول موجي في طيف الضوء المرئي؟", options: ["الأحمر", "البنفسجي", "الأزرق", "الأصفر"], correct: "الأحمر", fb: "الأحمر هو الأطول موجياً والأقل تردداً في الطيف." },
        { q: "المعدل الزمني للشغل المبذول يسمى بـ:", options: ["القدرة", "الزخم", "التسارع", "القوة"], correct: "القدرة", fb: "القدرة (P) تساوي الشغل مقسوماً على الزمن وتقاس بالواط." },
        { q: "عند سقوط جسم سقوطاً حراً، فإن تسارعه يكون:", options: ["ثابتاً", "صفراً", "متزايداً باستمرار", "متناقصاً"], correct: "ثابتاً", fb: "الجسم يسقط بتسارع الجاذبية الثابت (9.8 م/ث²)." },
        { q: "القصور الذاتي للجسم يرتبط ارتباطاً طردياً مع:", options: ["كتلته", "سرعته", "حجمه", "وزنه فقط"], correct: "كتلته", fb: "كلما زادت كتلة الجسم زادت مقاومته لتغيير حالته الحركية." },
        { q: "الموجات التي لا تحتاج لوسط مادي لانتقالها هي الموجات:", options: ["الكهرومغناطيسية", "الميكانيكية", "الصوتية", "الزلزالية"], correct: "الكهرومغناطيسية", fb: "مثل الضوء، يمكنه الانتقال في الفراغ." },
        { q: "تستخدم العدسات المقعرة لعلاج عيب بصري يسمى:", options: ["قصر النظر", "طول النظر", "الاستجماتيزم", "المياه الزرقاء"], correct: "قصر النظر", fb: "العدسة المقعرة تفرق الأشعة لتسقط على الشبكية تماماً." },
        { q: "المرايا الجانبية في السيارات هي مرايا ........ لتوفير رؤية واسعة:", options: ["محدبة", "مقعرة", "مستوية", "اسطوانية"], correct: "محدبة", fb: "المرايا المحدبة تصغر الصورة وتوسع مدى الرؤية للسائق." },
        { q: "تحول المادة من الحالة الغازية إلى الحالة السائلة يسمى:", options: ["تكاثف", "تبخر", "تسامي", "انصهار"], correct: "تكاثف", fb: "التكاثف يحدث عند فقدان الغاز للطاقة الحرارية." },
        { q: "المواد التي تسمح بانتقال الشحنات خلالها بسهولة هي:", options: ["الموصلات", "العوازل", "أشباه الموصلات", "البلاستيك"], correct: "الموصلات", fb: "الموصلات (كالمعادن) تمتلك إلكترونات حرة الحركة." },
        { q: "يُقاس التردد بوحدة:", options: ["هيرتز", "أوم", "كولوم", "فولت"], correct: "هيرتز", fb: "الهيرتز (Hz) يمثل عدد الدورات أو الاهتزازات في الثانية." },
        { q: "أول من قال بأن المادة تتكون من ذرات صغيرة هو العالم:", options: ["ديمقريطس", "أرسطو", "نيوتن", "فاراداي"], correct: "ديمقريطس", fb: "ديمقريطس هو فيلسوف يوناني وضع بذور النظرية الذرية." },
        { q: "شحنة البروتون تكون دائماً:", options: ["موجبة", "سالبة", "متعادلة", "صفر"], correct: "موجبة", fb: "البروتونات موجبة وتوجد داخل نواة الذرة." },
        { q: "الطاقة المخزنة في الجسم نتيجة وضعه أو شكله تسمى:", options: ["طاقة وضع", "طاقة حركية", "طاقة حرارية", "طاقة نووية"], correct: "طاقة وضع", fb: "مثل طاقة الوضع الجذبية أو المرونية في الزنبرك." },
        { q: "قانون أوم يوضح العلاقة بين الجهد والتيار و:", options: ["المقاومة", "الزمن", "المسافة", "الكتلة"], correct: "المقاومة", fb: "ينص القانون على أن V = I * R." },
        { q: "الألوان الأساسية للضوء هي الأحمر والأخضر و:", options: ["الأزرق", "الأصفر", "الأبيض", "الأسود"], correct: "الأزرق", fb: "هذه هي الألوان التي يتكون منها الضوء الأبيض عند دمجها." },
        { q: "عملية شحن الجسم عن طريق اللمس تسمى الشحن بـ:", options: ["التوصيل", "الحث", "الدلك", "الإشعاع"], correct: "التوصيل", fb: "التوصيل يتطلب تلامساً مباشراً لانتقال الشحنات." },
        { q: "سرعة الضوء في الفراغ تساوي تقريباً:", options: ["300,000 كم/ث", "340 م/ث", "1000 م/ث", "صفر"], correct: "300,000 كم/ث", fb: "الضوء هو أسرع شيء في الكون المعروف." },
        { q: "الجهاز الذي يحول الطاقة الحركية إلى طاقة كهربائية هو:", options: ["المولد", "المحرك", "المصباح", "البطارية"], correct: "المولد", fb: "المولد الكهربائي (الدينامو) ينتج تياراً عند تدويره." }
    ];

    function startQuiz() {
        const name = document.getElementById('student-name').value.trim();
        const sClass = document.getElementById('student-class').value.trim();
        
        if (name.split(" ").length < 3) return alert("يرجى إدخال اسمك الثلاثي كاملاً.");
        if (!sClass) return alert("يرجى إدخال الفصل (مثال: 3 / 1).");
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        if(currentIdx >= questions.length) return finishQuiz();
        
        const q = questions[currentIdx];
        document.getElementById('current-q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const drawArea = document.getElementById('drawing-area');
        if(q.draw) {
            drawArea.innerHTML = q.draw;
            drawArea.style.display = 'flex';
        } else {
            drawArea.style.display = 'none';
        }

        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        // خلط الخيارات الأربعة
        let opts = [...q.options];
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }

        opts.forEach(o => {
            const d = document.createElement('div');
            d.className = 'option';
            d.innerText = o;
            d.onclick = () => checkAnswer(o, d, q);
            container.appendChild(d);
        });

        let timeLeft = 60;
        document.getElementById('timer').innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) checkAnswer(null, null, q);
        }, 1000);
        
        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(sel, el, qObj) {
        clearInterval(timerInterval);
        const isCorrect = sel === qObj.correct;
        if(isCorrect) score++;
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.style.pointerEvents = 'none';
            if(opt.innerText === qObj.correct) opt.classList.add('correct-opt');
            if(sel && opt.innerText === sel && !isCorrect) opt.classList.add('wrong-opt');
        });
        
        const fbArea = document.getElementById('feedback-area');
        fbArea.style.display = 'block';
        fbArea.className = isCorrect ? 'fb-success' : 'fb-danger';
        document.getElementById('fb-status').innerText = isCorrect ? "أحسنت، إجابة صحيحة! ✅" : "للأسف، إجابة خاطئة ❌";
        document.getElementById('fb-explanation').innerText = qObj.fb;
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-score-num').innerText = score;
        document.getElementById('res-student-info').innerText = 
            "الطالب: " + document.getElementById('student-name').value + " | فصل: " + document.getElementById('student-class').value;
    }
</script>
</body>
</html>
