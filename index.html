<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفيزياء (نموذج 3 المطور) - الأستاذ إبراهيم الأسمري</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; --dark: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; }
        .container::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--primary), #60a5fa); }
        .teacher-name { color: var(--danger); font-size: 1.6em; font-weight: bold; display: block; margin-top: 10px; }
        .school-name { color: #64748b; font-size: 1.2em; font-weight: 500; display: block; margin-bottom: 15px; }
        .q-counter { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
        
        /* تحسين صندوق الصورة */
        .img-container { background: #f1f5f9; border-radius: 15px; padding: 10px; margin: 15px auto; max-width: 400px; display: none; border: 1px solid #e2e8f0; }
        .q-image { max-width: 100%; height: auto; border-radius: 10px; }

        .input-group { margin: 20px auto; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        input[type="text"] { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        #feedback-area { display: none; margin: 15px auto; padding: 15px; border-radius: 12px; max-width: 650px; text-align: right; border-right: 5px solid; }
        .fb-success { background: #dcfce7; border-color: #16a34a; color: #15803d; }
        .fb-danger { background: #fee2e2; border-color: #dc2626; color: #b91c1c; }
        .result-card { background: #f1f5f9; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .score-circle { width: 90px; height: 90px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 6px solid var(--primary); font-size: 20px; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: #e2e8f0; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 1.5s ease; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th { background: #1e293b; color: white; padding: 10px; font-size: 14px; }
        td { padding: 10px; border: 1px solid #e2e8f0; font-size: 13px; text-align: right; }
        #quiz-screen, #result-screen, #blocked-screen { display: none; }
        .option { background: #f8fafc; padding: 14px; width: 90%; max-width: 550px; border-radius: 12px; cursor: pointer; margin: 8px auto; border: 2px solid #e2e8f0; transition: 0.2s; text-align: right; }
        .correct-opt { background: #dcfce7 !important; border-color: var(--success) !important; color: #16a34a; font-weight: bold; }
        .wrong-opt { background: #fee2e2 !important; border-color: var(--danger) !important; color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="blocked-screen">
        <h1 style="color: var(--danger);">تنبيه ⚠️</h1>
        <p>عذراً، لا يمكنك أداء الاختبار أكثر من مرة.</p>
    </div>

    <div id="start-screen">
        <h1>اختبار الفيزياء (نموذج 3 - بصري) 🚀</h1>
        <span class="teacher-name">الأستاذ: إبراهيم الأسمري</span>
        <span class="school-name">ثانوية الأمير عبدالمجيد</span>
        <div class="input-group">
            <input type="text" id="student-name" placeholder="الاسم الثلاثي للطالب">
            <input type="text" id="student-class" placeholder="الفصل">
        </div>
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-screen">
        <div class="q-counter">سؤال <span id="current-q-num">1</span> من 25</div>
        <div style="font-weight: bold; color: var(--danger);">⏳ المتبقي: <span id="timer">60</span> ث</div>
        <h2 id="q-text" style="margin: 15px 0;"></h2>
        
        <div id="q-img-box" class="img-container">
            <img id="q-img-element" class="q-image" src="" alt="توضيح بصري للسؤال">
        </div>

        <div id="options-container"></div>
        <div id="feedback-area">
            <strong id="fb-status"></strong>
            <p id="fb-explanation"></p>
        </div>
        <button id="next-btn" class="btn" style="display:none; margin-top: 15px;" onclick="nextQuestion()">السؤال التالي ➡️</button>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <div class="score-circle"><span id="res-score-num">0</span> / 25</div>
            <div id="res-student-info" style="font-weight: bold;"></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th></tr></thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let score = 0; let currentIdx = 0; let log = []; let timerInterval;

    const questions = [
        { 
            q: "ما هو نوع العدسة التي تظهر في الشكل وتقوم بتجميع الأشعة؟", 
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Lens1.svg/200px-Lens1.svg.png", 
            options: ["عدسة مقعرة", "عدسة محدبة", "عدسة مستوية", "عدسة مفرقة"], 
            correct: "عدسة محدبة", 
            fb: "العدسة المحدبة تكون سميكة من الوسط وتجمع الأشعة المتوازية في البؤرة." 
        },
        { 
            q: "في الشكل المجاور، ماذا تسمى ظاهرة انحراف الضوء عند انتقاله بين وسطين؟", 
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Refraction_in_a_glass_block.svg/200px-Refraction_in_a_glass_block.svg.png", 
            options: ["الانعكاس", "الانكسار", "الحيود", "الاستقطاب"], 
            correct: "الانكسار", 
            fb: "الانكسار يحدث بسبب تغير سرعة الضوء عند انتقاله من وسط إلى آخر." 
        },
        { 
            q: "ما هو الرمز الكهربائي الذي يشير للمقاومة في الدوائر؟", 
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Resistor_symbol_IEC.svg/150px-Resistor_symbol_IEC.svg.png", 
            options: ["المستطيل / الزجزاج", "الدائرة", "الخط المستقيم", "المثلث"], 
            correct: "المستطيل / الزجزاج", 
            fb: "هذا الرمز العالمي يُستخدم لتمثيل المقاومة الكهربائية الثابتة." 
        },
        { 
            q: "أي نوع من المرايا يعطي دائماً صورة خيالية ومعكوسة جانبياً؟", 
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Reflection_angles.svg/200px-Reflection_angles.svg.png", 
            options: ["مرآة مستوية", "مرآة مقعرة", "مرآة محدبة", "عدسة"], 
            correct: "مرآة مستوية", 
            fb: "المرآة المستوية تكون الصورة فيها خيالية، معتدلة، ومساوية للجسم." 
        },
        { 
            q: "في الشكل، يمثل الخط الأحمر الشعاع:", 
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Snells_law2.svg/200px-Snells_law2.svg.png", 
            options: ["الساقط", "المنكسر", "المنعكس", "المشتت"], 
            correct: "المنكسر", 
            fb: "الشعاع المنكسر هو الذي يمر إلى الوسط الثاني بزاوية مختلفة." 
        },
        // باقي الأسئلة
        { q: "وحدة قياس القوة هي:", options: ["نيوتن", "جول", "واط", "فولت"], correct: "نيوتن", fb: "النيوتن هو وحدة قياس القوة في النظام الدولي." },
        { q: "الجهاز المستخدم لقياس التيار هو:", options: ["الأميتر", "الفولتمتر", "الأوميتر", "البارومتر"], correct: "الأميتر", fb: "الأميتر يوصل على التوالي لقياس شدة التيار." },
        { q: "الطاقة الحركية تعتمد على الكتلة و:", options: ["السرعة", "الزمن", "الارتفاع", "الحجم"], correct: "السرعة", fb: "KE = ½ mv²." },
        { q: "سرعة الضوء في الفراغ تساوي:", options: ["3x10^8 م/ث", "340 م/ث", "1000 م/ث", "0"], correct: "3x10^8 م/ث", fb: "الضوء أسرع شيء في الكون." },
        { q: "أصغر شحنة كهربائية موجودة بشكل مستقل هي شحنة:", options: ["الإلكترون", "النيوترون", "الذرة", "الجزيء"], correct: "الإلكترون", fb: "شحنة الإلكترون هي الشحنة الأساسية." },
        { q: "تنشأ الكهرباء الساكنة نتيجة انتقال:", options: ["الإلكترونات", "البروتونات", "النيوترونات", "الذرات"], correct: "الإلكترونات", fb: "الدلك يسبب انتقال الإلكترونات من جسم لآخر." },
        { q: "المقاومة المكافئة في التوالي تكون:", options: ["كبيرة", "صغيرة", "صفر", "لا تتغير"], correct: "كبيرة", fb: "في التوالي نجمع المقاومات فتزيد القيمة الكلية." },
        { q: "اللون الذي له أكبر طول موجي في الطيف هو:", options: ["الأحمر", "البنفسجي", "الأخضر", "الأصفر"], correct: "الأحمر", fb: "الأحمر أقل تردداً وأكبر طولاً موجياً." },
        { q: "يُقاس التردد بوحدة:", options: ["هيرتز", "أوم", "جول", "متر"], correct: "هيرتز", fb: "الهيرتز هو عدد الاهتزازات في الثانية." },
        { q: "صوت الرعد مثال على الموجات:", options: ["الطولية", "المستعرضة", "الكهرومغناطيسية", "الضوئية"], correct: "الطولية", fb: "الصوت موجة ميكانيكية طولية." },
        { q: "القطبان المغناطيسيان المتشابهان:", options: ["يتنافران", "يتجاذبان", "لا يتفاعلان", "ينصهران"], correct: "يتنافران", fb: "قاعدة المغناطيس: الأقطاب المتشابهة تتنافر والمختلفة تتجاذب." },
        { q: "المادة التي لا تسمح بمرور الشحنات هي:", options: ["العازل", "الموصل", "أشباه الموصلات", "الفلزات"], correct: "العازل", fb: "العوازل مثل الخشب والبلاستيك لا توصل الكهرباء." },
        { q: "تحول المادة من غاز إلى سائل يسمى:", options: ["تكاثف", "تبخر", "انصهار", "تسامي"], correct: "تكاثف", fb: "التكاثف هو فقدان الحرارة للتحول من غاز لسائل." },
        { q: "المعدل الزمني للشغل المبذول هو:", options: ["القدرة", "القوة", "الزخم", "التسارع"], correct: "القدرة", fb: "القدرة هي الشغل مقسوماً على الزمن." },
        { q: "قانون نيوتن الثاني يربط بين القوة والكتلة و:", options: ["التسارع", "السرعة", "الزمن", "المسافة"], correct: "التسارع", fb: "F = ma." },
        { q: "عند السقوط الحر، التسارع يكون:", options: ["ثابت", "متغير", "صفر", "متناقص"], correct: "ثابت", fb: "تسارع الجاذبية ثابت وقيمته 9.8 م/ث²." },
        { q: "المرايا الجانبية للسيارة تكون:", options: ["محدبة", "مقعرة", "مستوية", "اسطوانية"], correct: "محدبة", fb: "لأنها توفر مجال رؤية واسعاً وصوراً معتدلة." },
        { q: "شحنة البروتون تكون:", options: ["موجبة", "سالبة", "متعادلة", "صفر"], correct: "موجبة", fb: "البروتونات داخل النواة وموجبة الشحنة." },
        { q: "عملية شحن الجسم دون ملامسته تسمى:", options: ["الحث", "التوصيل", "الدلك", "الاحتكاك"], correct: "الحث", fb: "الشحن بالحث يتم عن طريق تقريب جسم مشحون." },
        { q: "مخترع المصباح الكهربائي هو:", options: ["أديسون", "نيوتن", "أينشتاين", "تسلا"], correct: "أديسون", fb: "توماس أديسون هو صاحب براءة اختراع المصباح التجاري." }
    ];

    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }

    window.onload = () => { if(localStorage.getItem('quiz_m3_final_v1')) { document.getElementById('start-screen').style.display='none'; document.getElementById('blocked-screen').style.display='block'; } };

    function startQuiz() {
        const name = document.getElementById('student-name').value.trim();
        if(!name) return alert("من فضلك أدخل اسمك.");
        shuffle(questions);
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        if(currentIdx >= questions.length) return finishQuiz();
        document.getElementById('current-q-num').innerText = currentIdx + 1;
        let timeLeft = 60; document.getElementById('timer').innerText = timeLeft;
        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        const q = questions[currentIdx];
        document.getElementById('q-text').innerText = q.q;
        
        const imgBox = document.getElementById('q-img-box');
        const imgEl = document.getElementById('q-img-element');
        if(q.img) { imgEl.src = q.img; imgBox.style.display = 'block'; } else { imgBox.style.display = 'none'; }

        let opts = [...q.options]; shuffle(opts);
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        opts.forEach(o => {
            const d = document.createElement('div'); d.className = 'option'; d.innerText = o;
            d.onclick = () => checkAnswer(o, d, q);
            container.appendChild(d);
        });
        timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft<=0) checkAnswer(null, null, q); }, 1000);
    }

    function checkAnswer(selected, el, qObj) {
        clearInterval(timerInterval);
        const isCorrect = selected === qObj.correct;
        if(isCorrect) score++;
        log.push({q: qObj.q, user: selected || "تجاوز الوقت", correct: qObj.correct, status: isCorrect, fb: qObj.fb});
        document.querySelectorAll('.option').forEach(opt => {
            opt.style.pointerEvents = 'none';
            if(opt.innerText === qObj.correct) opt.classList.add('correct-opt');
            if(selected && opt.innerText === selected && !isCorrect) opt.classList.add('wrong-opt');
        });
        const fbArea = document.getElementById('feedback-area');
        fbArea.style.display = 'block';
        fbArea.className = isCorrect ? 'fb-success' : 'fb-danger';
        document.getElementById('fb-status').innerText = isCorrect ? "أحسنت! إجابة صحيحة ✅" : "إجابة خاطئة ❌";
        document.getElementById('fb-explanation').innerText = "التوضيح: " + qObj.fb;
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() { currentIdx++; showQuestion(); }

    function finishQuiz() {
        localStorage.setItem('quiz_m3_final_v1', 'true');
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-score-num').innerText = score;
        document.getElementById('res-student-info').innerText = document.getElementById('student-name').value;
        setTimeout(() => { document.getElementById('progress-fill').style.width = (score/25*100) + "%"; }, 500);
        const body = document.getElementById('summary-body');
        log.forEach((l, i) => { body.innerHTML += `<tr><td>${i+1}</td><td>${l.q}</td><td style="color:${l.status?'green':'red'}">${l.user}</td><td>${l.correct}</td></tr>`; });
    }
</script>
</body>
</html>
